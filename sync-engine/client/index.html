<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync Engine — Collaborative Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242736;
      --border: #2e3144;
      --text: #e4e6f0;
      --text-dim: #8b8fa3;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-sans: 'Inter', -apple-system, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px;
    }

    .controls { display: flex; align-items: center; gap: 12px; }

    input, button { font-family: var(--font-sans); font-size: 13px; outline: none; }
    input {
      background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 12px; border-radius: 6px; width: 140px; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    button {
      background: var(--accent); color: #fff; border: none; padding: 6px 16px;
      border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s;
    }
    button:hover { filter: brightness(1.15); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 6px 24px; display: flex; align-items: center; gap: 20px;
      font-size: 12px; color: var(--text-dim); flex-wrap: wrap;
    }

    .status-indicator { display: flex; align-items: center; gap: 6px; }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); transition: background 0.3s; }
    .dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(52, 211, 153, 0.5); }
    .dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .badge {
      background: var(--surface-2); padding: 2px 8px;
      border-radius: 4px; font-family: var(--font-mono); font-size: 11px;
    }

    /* ── Cursor Presence Bar ──────────────────────────── */
    #presenceBar {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto; flex-wrap: wrap;
    }

    .presence-avatar {
      display: flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 12px;
      font-size: 11px; font-weight: 600;
      border: 1.5px solid transparent;
      transition: all 0.3s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .presence-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── Main Editor Area ────────────────────────────── */
    main { flex: 1; display: flex; flex-direction: column; padding: 24px; gap: 16px; }

    /* The editor wrapper holds the textarea + cursor overlays */
    .editor-wrapper {
      flex: 1; position: relative; min-height: 300px;
    }

    #editor {
      width: 100%; height: 100%; min-height: 300px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px;
      font-family: var(--font-mono); font-size: 15px; line-height: 1.7;
      color: var(--text); resize: none; transition: border-color 0.2s, box-shadow 0.2s;
      position: relative; z-index: 1;
    }
    #editor:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    /* ── Cursor Tooltip Overlay ──────────────────────── */
    /* We render a hidden mirror div to measure character positions */
    #editorMirror {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      padding: 20px; /* must match #editor padding */
      font-family: var(--font-mono); font-size: 15px; line-height: 1.7;
      color: transparent; pointer-events: none; white-space: pre-wrap;
      word-break: break-word; overflow: hidden; border-radius: 10px;
      z-index: 2;
    }

    .cursor-caret {
      display: inline-block; width: 2px; height: 1.2em;
      position: relative; vertical-align: text-bottom;
      animation: caretBlink 1s ease-in-out infinite;
      transition: left 0.1s ease;
    }

    @keyframes caretBlink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.3; }
    }

    .cursor-label {
      position: absolute; top: calc(100% + 2px); left: 0;
      font-family: var(--font-sans); font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px; white-space: nowrap;
      pointer-events: none; color: #fff; letter-spacing: 0.3px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 10;
    }

    /* ── Op Log ──────────────────────────────────────── */
    .log-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; max-height: 180px; overflow-y: auto;
    }
    .log-header {
      padding: 10px 16px; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface);
    }
    .log-entry {
      padding: 5px 16px; font-size: 12px; font-family: var(--font-mono);
      color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; gap: 12px;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .op-type { font-weight: 600; min-width: 60px; }
    .log-entry .op-from { color: var(--green); min-width: 80px; overflow: hidden; text-overflow: ellipsis; }
    .log-entry .op-detail { color: var(--text); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span>Sync Engine</span>
    </div>
    <div class="controls">
      <input type="text" id="userId"  placeholder="User ID">
      <input type="text" id="docId"   placeholder="Doc ID" value="demo-doc">
      <button id="undoBtn"    onclick="sendUndo()" disabled title="Ctrl+Z">↩ Undo</button>
      <button id="redoBtn"    onclick="sendRedo()" disabled title="Ctrl+Y">↪ Redo</button>
      <button id="connectBtn" onclick="toggleConnection()">Connect</button>
    </div>
  </header>

  <div class="status-bar">
    <div class="status-indicator">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
    <div class="status-indicator">
      <span>Version:</span>
      <span class="badge" id="versionBadge">0</span>
    </div>
    <div class="status-indicator">
      <span>Ops sent:</span>
      <span class="badge" id="opsSentBadge">0</span>
    </div>
    <div class="status-indicator">
      <span>Ops recv:</span>
      <span class="badge" id="opsRecvBadge">0</span>
    </div>
    <div class="status-indicator">
      <span>Undo:</span>
      <span class="badge" id="undoBadge">0</span>
    </div>
    <div class="status-indicator">
      <span>Redo:</span>
      <span class="badge" id="redoBadge">0</span>
    </div>
    <!-- Live presence avatars appear here -->
    <div id="presenceBar"></div>
  </div>

  <main>
    <div class="editor-wrapper">
      <textarea id="editor" placeholder="Connect and start typing to collaborate..."></textarea>
      <!-- Mirror div for cursor position calculation -->
      <div id="editorMirror" aria-hidden="true"></div>
    </div>

    <div class="log-panel">
      <div class="log-header">Operation Log</div>
      <div id="opLog"></div>
    </div>
  </main>

  <script>
    // ── State ─────────────────────────────────────────────
    let ws = null;
    let token = null;
    let currentVersion = 0;
    let opsSent = 0;
    let opsRecv = 0;
    let isConnected = false;
    let lastSentContent = '';

    // Peer cursors: userId → { position, color }
    const peerCursors = {};

    const userIdInput   = document.getElementById('userId');
    userIdInput.value   = 'user-' + Math.random().toString(36).slice(2, 7);

    const editor        = document.getElementById('editor');
    const mirror        = document.getElementById('editorMirror');
    const statusDot     = document.getElementById('statusDot');
    const statusText    = document.getElementById('statusText');
    const versionBadge  = document.getElementById('versionBadge');
    const opsSentBadge  = document.getElementById('opsSentBadge');
    const opsRecvBadge  = document.getElementById('opsRecvBadge');
    const connectBtn    = document.getElementById('connectBtn');
    const opLogDiv      = document.getElementById('opLog');
    const presenceBar   = document.getElementById('presenceBar');

    // ── Connection ────────────────────────────────────────
    async function toggleConnection() {
      if (isConnected) { disconnect(); return; }
      await connect();
    }

    async function connect() {
      const userId = userIdInput.value.trim() || 'anonymous';
      const docId  = document.getElementById('docId').value.trim() || 'demo-doc';
      setStatus('connecting', 'Connecting...');
      connectBtn.disabled = true;

      try {
        const res  = await fetch(`/api/token?userId=${encodeURIComponent(userId)}`);
        const data = await res.json();
        token = data.token;

        const wsUrl = `ws://${location.host}?token=${encodeURIComponent(token)}`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          ws.send(JSON.stringify({ type: 'join', docId }));
        };

        ws.onmessage = (event) => {
          handleMessage(JSON.parse(event.data));
        };

        ws.onclose = () => {
          setStatus('disconnected', 'Disconnected');
          isConnected = false;
          connectBtn.textContent = 'Connect';
          connectBtn.disabled = false;
          // Clear all peer cursors on disconnect
          Object.keys(peerCursors).forEach(uid => removePeerCursor(uid));
        };

        ws.onerror = () => setStatus('disconnected', 'Error');
      } catch (err) {
        console.error('Connection failed:', err);
        setStatus('disconnected', 'Failed');
        connectBtn.disabled = false;
      }
    }

    function disconnect() {
      if (ws) ws.close();
      ws = null;
      isConnected = false;
      connectBtn.textContent = 'Connect';
    }

    // ── Message Handler ───────────────────────────────────
    function handleMessage(msg) {
      switch (msg.type) {
        case 'auth_ok':
          addLog('AUTH', msg.userId, 'Authenticated');
          break;

        case 'joined':
          isConnected = true;
          currentVersion = msg.version;
          lastSentContent = msg.doc;
          editor.value = msg.doc;
          connectBtn.textContent = 'Disconnect';
          connectBtn.disabled = false;
          setStatus('connected', `Connected as ${userIdInput.value}`);
          updateBadges();
          updateUndoRedoBadges(0, 0);
          undoBtn.disabled = true; // enabled once user has sent an op
          redoBtn.disabled = true;
          addLog('JOIN', 'server', `Joined doc (v${msg.version})`);
          // Render any existing peer cursors in the room
          if (msg.cursors) {
            for (const [uid, cur] of Object.entries(msg.cursors)) {
              updatePeerCursor(uid, cur.position, cur.color);
            }
          }
          break;

        case 'ack':
          currentVersion = msg.version;
          updateBadges();
          // Server sends undoDepth/redoDepth on ack after undo/redo
          if (msg.undoDepth !== undefined || msg.redoDepth !== undefined) {
            updateUndoRedoBadges(msg.undoDepth, msg.redoDepth);
          }
          break;

        case 'undo_empty':
          addLog('UNDO', 'server', '⚠ Nothing left to undo');
          break;

        case 'redo_empty':
          addLog('REDO', 'server', '⚠ Nothing left to redo');
          break;

        case 'sync': {
          opsRecv++;
          currentVersion = msg.version;
          const cursorPos = editor.selectionStart;
          // Transform peer cursor positions BEFORE applying the op
          // so they stay accurate after the doc changes
          transformCursorPositions(msg.op);
          applyRemoteOp(msg.op, cursorPos);
          lastSentContent = editor.value;
          updateBadges();
          const label = msg.isUndo ? 'UNDO' : msg.isRedo ? 'REDO' : msg.op.type.toUpperCase();
          addLog(label, msg.clientId, formatOp(msg.op));
          break;
        }

        case 'catch_up':
          currentVersion = msg.version;
          editor.value = msg.doc;
          lastSentContent = msg.doc;
          updateBadges();
          addLog('SYNC', 'server', `Caught up to v${msg.version}`);
          break;

        // ── CURSOR PRESENCE ──────────────────────────────
        case 'cursor_move':
          updatePeerCursor(msg.userId, msg.position, msg.color);
          break;

        case 'cursor_leave':
          removePeerCursor(msg.userId);
          addLog('LEAVE', msg.userId, 'left the document');
          break;

        case 'rate_limited':
          addLog('LIMIT', 'server', msg.message);
          break;

        case 'error':
          addLog('ERROR', 'server', msg.message);
          break;
      }
    }

    // ── Cursor Presence ───────────────────────────────────

    /**
     * Transform all stored peer cursor positions against an incoming op.
     * Called every time a remote op arrives so cursors don't go stale.
     *
     * insert(pos, text):  cursors at or after pos shift RIGHT by text.length
     * delete(pos, len):   cursors after pos+len shift LEFT by len
     *                     cursors inside [pos, pos+len) clamp to pos
     */
    function transformCursorPositions(op) {
      for (const userId of Object.keys(peerCursors)) {
        let p = peerCursors[userId].position;

        if (op.type === 'insert') {
          if (p >= op.position) p += op.text.length;
        } else if (op.type === 'delete') {
          const end = op.position + op.length;
          if (p > end)          p -= op.length;    // after deletion: shift left
          else if (p > op.position) p = op.position; // inside deletion: clamp
          // before deletion: unchanged
        }

        peerCursors[userId].position = p;
      }
      // Re-render with updated positions (no need to call updatePresenceBar)
      renderCursors();
    }

    /**
     * Update or create the visual caret for a peer.
     */
    function updatePeerCursor(userId, position, color) {
      peerCursors[userId] = { position, color };
      updatePresenceBar();
      renderCursors();
    }

    function removePeerCursor(userId) {
      delete peerCursors[userId];
      updatePresenceBar();
      renderCursors();
    }

    function renderCursors() {
      const text = editor.value;
      // Sort cursors by position so we can insert them left to right
      const sorted = Object.entries(peerCursors)
        .sort((a, b) => a[1].position - b[1].position);

      let html = '';
      let lastIdx = 0;

      for (const [userId, { position, color }] of sorted) {
        const pos = Math.min(position, text.length);
        // Escape text chunk before this cursor
        html += escapeHtml(text.slice(lastIdx, pos));
        // Insert the caret element
        html += `
          <span class="cursor-caret" style="background:${color}">
            <span class="cursor-label" style="background:${color}">${escapeHtml(userId)}</span>
          </span>
        `;
        lastIdx = pos;
      }

      // Remaining text after last cursor
      html += escapeHtml(text.slice(lastIdx));
      mirror.innerHTML = html;
    }

    function updatePresenceBar() {
      presenceBar.innerHTML = '';
      for (const [userId, { color }] of Object.entries(peerCursors)) {
        const avatar = document.createElement('div');
        avatar.className = 'presence-avatar';
        avatar.style.borderColor = color;
        avatar.style.background = color + '22'; // 13% opacity
        avatar.innerHTML = `
          <span class="presence-dot" style="background:${color}"></span>
          <span style="color:${color}">${escapeHtml(userId)}</span>
        `;
        presenceBar.appendChild(avatar);
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>')
        .replace(/ /g, '&nbsp;');
    }

    // ── Undo / Redo ───────────────────────────────────────
    const undoBtn  = document.getElementById('undoBtn');
    const redoBtn  = document.getElementById('redoBtn');
    const undoBadge = document.getElementById('undoBadge');
    const redoBadge = document.getElementById('redoBadge');

    function sendUndo() {
      if (!ws || !isConnected) return;
      const docId = document.getElementById('docId').value.trim() || 'demo-doc';
      ws.send(JSON.stringify({ type: 'undo', docId }));
      addLog('UNDO', 'me', 'Sent undo request');
    }

    function sendRedo() {
      if (!ws || !isConnected) return;
      const docId = document.getElementById('docId').value.trim() || 'demo-doc';
      ws.send(JSON.stringify({ type: 'redo', docId }));
      addLog('REDO', 'me', 'Sent redo request');
    }

    // Intercept Ctrl+Z / Ctrl+Y — prevent browser's native undo
    // and send our OT-aware undo/redo to the server instead
    editor.addEventListener('keydown', (e) => {
      const isUndo = (e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey;
      const isRedo = (e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey));

      if (isUndo && isConnected) {
        e.preventDefault(); // stop browser's native textarea undo
        sendUndo();
        return;
      }
      if (isRedo && isConnected) {
        e.preventDefault();
        sendRedo();
        return;
      }
    });

    function updateUndoRedoBadges(undoDepth, redoDepth) {
      if (undoDepth !== undefined) {
        undoBadge.textContent = undoDepth;
        undoBtn.disabled = !isConnected || undoDepth === 0;
      }
      if (redoDepth !== undefined) {
        redoBadge.textContent = redoDepth;
        redoBtn.disabled = !isConnected || redoDepth === 0;
      }
    }

    // ── Send cursor position on every keyup/click ─────────
    function sendCursor() {
      if (!ws || !isConnected) return;
      const docId = document.getElementById('docId').value.trim() || 'demo-doc';
      ws.send(JSON.stringify({
        type:     'cursor',
        docId,
        position: editor.selectionStart,
      }));
    }

    editor.addEventListener('keyup',    sendCursor);
    editor.addEventListener('click',    sendCursor);
    editor.addEventListener('mouseup',  sendCursor);
    editor.addEventListener('touchend', sendCursor);

    // ── Editor Input Handling ─────────────────────────────
    let inputTimer = null;
    editor.addEventListener('input', () => {
      if (!isConnected) return;
      clearTimeout(inputTimer);
      inputTimer = setTimeout(sendDiff, 50);
    });

    function sendDiff() {
      if (!ws || !isConnected) return;
      const oldText = lastSentContent;
      const newText = editor.value;
      if (oldText === newText) return;

      let start = 0;
      while (start < oldText.length && start < newText.length && oldText[start] === newText[start]) start++;

      let oldEnd = oldText.length;
      let newEnd = newText.length;
      while (oldEnd > start && newEnd > start && oldText[oldEnd - 1] === newText[newEnd - 1]) { oldEnd--; newEnd--; }

      const deletedLen    = oldEnd - start;
      const insertedText  = newText.slice(start, newEnd);
      const docId         = document.getElementById('docId').value.trim() || 'demo-doc';

      if (deletedLen > 0) {
        const op = { type: 'delete', position: start, length: deletedLen, clientId: userIdInput.value, version: currentVersion };
        ws.send(JSON.stringify({ type: 'op', docId, op, version: currentVersion }));
        opsSent++;
        undoBtn.disabled = false; // user now has something to undo
        addLog('DELETE', 'me', `pos=${start} len=${deletedLen}`);
      }
      if (insertedText.length > 0) {
        const op = { type: 'insert', position: start, text: insertedText, clientId: userIdInput.value, version: currentVersion };
        ws.send(JSON.stringify({ type: 'op', docId, op, version: currentVersion }));
        opsSent++;
        undoBtn.disabled = false; // user now has something to undo
        addLog('INSERT', 'me', `pos=${start} "${insertedText}"`);
      }

      lastSentContent = newText;
      renderCursors(); // re-render after doc changes
      updateBadges();
    }

    // ── Apply Remote Operations ───────────────────────────
    function applyRemoteOp(op, myPos) {
      const text = editor.value;
      if (op.type === 'insert') {
        const pos = Math.min(op.position, text.length);
        editor.value = text.slice(0, pos) + op.text + text.slice(pos);
        const newPos = myPos >= pos ? myPos + op.text.length : myPos;
        editor.setSelectionRange(newPos, newPos);
      } else if (op.type === 'delete') {
        const pos = Math.min(op.position, text.length);
        const end = Math.min(pos + op.length, text.length);
        editor.value = text.slice(0, pos) + text.slice(end);
        const newPos = myPos > pos && myPos <= end ? pos : myPos > end ? myPos - op.length : myPos;
        editor.setSelectionRange(newPos, newPos);
      }
      renderCursors();
    }

    // ── UI Helpers ────────────────────────────────────────
    function setStatus(state, text) {
      statusDot.className = 'dot ' + state;
      statusText.textContent = text;
    }

    function updateBadges() {
      versionBadge.textContent  = currentVersion;
      opsSentBadge.textContent  = opsSent;
      opsRecvBadge.textContent  = opsRecv;
    }

    function formatOp(op) {
      if (op.type === 'insert') return `pos=${op.position} "${op.text}"`;
      if (op.type === 'delete') return `pos=${op.position} len=${op.length}`;
      return JSON.stringify(op);
    }

    function addLog(type, from, detail) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      // Color the type label based on type
      const typeColor = { INSERT: '#6c63ff', DELETE: '#f87171', AUTH: '#34d399',
                          JOIN: '#38bdf8',   SYNC: '#fbbf24',   CURSOR: '#a78bfa',
                          LEAVE: '#fb923c',  ERROR: '#f87171',  LIMIT: '#fbbf24' };
      const color = typeColor[type] || '#8b8fa3';
      entry.innerHTML = `
        <span class="op-type" style="color:${color}">${type}</span>
        <span class="op-from">${escapeHtml(from)}</span>
        <span class="op-detail">${escapeHtml(detail)}</span>
      `;
      opLogDiv.prepend(entry);
      while (opLogDiv.children.length > 50) opLogDiv.removeChild(opLogDiv.lastChild);
    }
  </script>
</body>
</html>
