services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7.0
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: syncuser
      MONGO_INITDB_ROOT_PASSWORD: syncpass
      MONGO_INITDB_DATABASE: syncengine
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: ./server
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      MONGO_URI: mongodb://syncuser:syncpass@mongodb:27017/syncengine?authSource=admin
      JWT_SECRET: change-me-in-production
      RATE_LIMIT_OPS_PER_SEC: 30
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  redis-data:
  mongo-data:
